<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work In Progress</title>
<style>
  :root {
    --glow-color: #4dd8ff;
    --bg-color: #0a0a0d;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    background: radial-gradient(circle at center, #12141a 0%, var(--bg-color) 70%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    overflow: hidden;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 2rem;
    padding: 2rem;
  }

  .logo {
    max-width: 260px;
    width: 60vw;
    height: auto;
    filter: drop-shadow(0 0 12px var(--glow-color))
            drop-shadow(0 0 30px var(--glow-color))
            drop-shadow(0 0 60px rgba(77, 216, 255, 0.5));
    animation: pulse 3s ease-in-out infinite;
  }

  .wip {
    font-size: clamp(1.2rem, 4vw, 2.2rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #ffffff;
    text-shadow: 0 0 8px var(--glow-color),
                 0 0 20px var(--glow-color),
                 0 0 40px rgba(77, 216, 255, 0.6);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% {
      opacity: 1;
      transform: scale(1);
    }
    50% {
      opacity: 0.75;
      transform: scale(1.02);
    }
  }
</style>
</head>
<body>

  <div class="container">
    <img src="logo.jpg" alt="Logo" class="logo">
    <div class="wip">Work in Progress</div>
  </div>

</body>
</html>
